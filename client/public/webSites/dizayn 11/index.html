        }
    }

    // Foydalanuvchi harakati bilan ijro etishga urinish
    function tryPlayOnInteraction() {
        playAudio();
    }

    // Sahifa yuklanganda avtomatik ijro etishga urinish
    myAudio.play()
        .then(() => {
            isPlaying = true;
        })
