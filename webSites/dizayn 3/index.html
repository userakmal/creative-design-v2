    let myAudio = document.getElementById("bg-sound");

    // Audio-ni ijro etish funksiyasi
    function playAudio() {

            myAudio.play()

                    isPlaying = true;
                    // Bir marta ijro boshlangach, hodisa tinglovchilarini o'chirish

                .catch(error => {
                    console.log("Play error: ", error);
                });
        }
    }

    // Foydalanuvchi harakati bilan ijro etishga urinish
    function tryPlayOnInteraction() {
        playAudio();
    }

    // Sahifa yuklanganda avtomatik ijro etishga urinish
    myAudio.play()
        .then(() => {
            isPlaying = true;
        })
        .catch(() => {
            // Agar autoplay bloklansa, foydalanuvchi harakatini kutish
            document.addEventListener("click", tryPlayOnInteraction, { once: true });

        });
});
